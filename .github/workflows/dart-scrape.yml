name: Dart Schedule Scraper

on:
  schedule:
    # Läuft täglich um 06:00 UTC (08:00 CEST / 07:00 CET)
    - cron: '0 6 * * *'
  workflow_dispatch:
    # Manuell ausführbar über GitHub → Actions → "Run workflow"

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # Erlaubt das Pushen von dart.json ins Repo

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: scrapers/package.json

      - name: Abhängigkeiten installieren
        run: npm install
        working-directory: scrapers

      - name: Dart-Daten scrapen
        run: node dart-scraper.js
        working-directory: scrapers

      - name: dart.json committen & pushen
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/dart.json
          # Nur committen wenn sich etwas geändert hat
          git diff --cached --quiet || git commit -m "chore: dart.json aktualisiert [$(date -u +%Y-%m-%dT%H:%M:%SZ)]"
          git push
