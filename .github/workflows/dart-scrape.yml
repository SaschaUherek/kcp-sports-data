name: Sport Schedule Scraper

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Abhängigkeiten installieren
        run: npm install

      - name: Dart-Daten scrapen
        run: node dart-scraper.js

      - name: F1-Daten scrapen
        run: node f1-scraper.js

      - name: JSON-Dateien committen & pushen
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/dart.json data/f1.json
          git diff --cached --quiet || git commit -m "chore: Sportdaten aktualisiert [$(date -u +%Y-%m-%dT%H:%M:%SZ)]"
          git push
